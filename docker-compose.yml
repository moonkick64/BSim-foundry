services:
  bsim_postgres:
    image: ghcr.io/quarkslab/sighthouse/ghidra-bsim-postgres:1.0.3
    container_name: bsim-foundry-postgres
    hostname: bsim_postgres
    volumes:
      - ./data/postgres:/home/user/ghidra-data
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "/ghidra/Ghidra/Features/BSim/support/pg_is_ready.sh || exit 1"]
      retries: 5
      interval: 30s
      timeout: 5s
    networks:
      - bsim-net

  create_bsim_db:
    image: ghcr.io/quarkslab/sighthouse/create_bsim_db:1.0.3
    container_name: bsim-foundry-create-db
    command: 'user "" bsim_postgres postgresql 5432'
    depends_on:
      bsim_postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - bsim-net

  ghidra:
    image: ghcr.io/quarkslab/sighthouse/ghidraheadless:1.0.3
    container_name: bsim-foundry-ghidra
    entrypoint: ["sleep", "infinity"]
    volumes:
      - ./work:/work
      # Path to the SCA-Benchmark artifacts tree (static .a archives). Override
      # via SCA_ARTIFACTS in a .env file or the environment; defaults to a
      # sibling checkout of SCA-Benchmark.
      - ${SCA_ARTIFACTS:-../SCA-Benchmark/artifacts}:/artifacts:ro
      - ./sighthouse/sighthouse-pipeline/src/sighthouse/pipeline/core_modules/GhidraAnalyzer/ghidrascripts:/scripts:ro
    networks:
      - bsim-net

  # ---- SightHouse frontend stack (for IDA / Binary Ninja / Ghidra clients) ----

  redis:
    image: redis:7
    container_name: bsim-foundry-redis
    volumes:
      - ./data/redis:/data
    networks:
      - bsim-net

  sighthouse_create_user:
    image: ghcr.io/quarkslab/sighthouse/sighthouse-frontend:1.0.3
    container_name: bsim-foundry-sighthouse-create-user
    # Image ships a wrapper at /entrypoint.sh that calls `sighthouse package
    # run`; bypass it and invoke the real binary directly.
    entrypoint: /home/user/.local/bin/sighthouse
    # One-shot: creates the initial login on the frontend's own metadata DB.
    # Note: `-d` belongs to the `frontend` parser, so it must precede the
    # `add-user` subcommand. Change <user>/<password> before running in any
    # non-local context.
    command: frontend -d sqlite:////data/frontend.db add-user user -p password
    restart: "no"
    volumes:
      - ./data/frontend:/data
    depends_on:
      bsim_postgres:
        condition: service_healthy
    networks:
      - bsim-net

  sighthouse_frontend:
    image: ghcr.io/quarkslab/sighthouse/sighthouse-frontend:1.0.3
    container_name: bsim-foundry-sighthouse-frontend
    entrypoint: /home/user/.local/bin/sighthouse
    command: >
      frontend -g /ghidra -d sqlite:////data/frontend.db
      -r local://data start
      -w redis://redis:6379/0
      -b postgresql://user@bsim_postgres:5432/bsim
    ports:
      - "127.0.0.1:6669:6671"
    volumes:
      - ./data/frontend:/data
    depends_on:
      - sighthouse_create_user
      - bsim_postgres
      - redis
    networks:
      - bsim-net

networks:
  bsim-net:
    driver: bridge
